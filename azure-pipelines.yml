# Azure DevOps Pipeline for Playwright Test Automation
# Supports multiple environments with dynamic parameters and Slack reporting

trigger:
  branches:
    include:
      - runcicd
  paths:
    exclude:
      - README.md
      - docs/*

# Configure repository source
resources:
  repositories:
  - repository: self
    type: git
    name: TMS/JobLogicTesting
    ref: ${{ parameters.branch }}

# Runtime parameters for pipeline execution
parameters:
- name: environment
  displayName: 'Target Environment'
  type: string
  default: 'uat'
  values:
    - 'uat'
    - 'staging'
    - 'prelive'

- name: planid
  displayName: 'Azure DevOps Test Plan ID (Optional)'
  type: string
  default: 'none'

- name: branch
  displayName: 'Source Branch'
  type: string
  default: 'master'

- name: specificTag
  displayName: 'Test Tag Filter (Optional - supports regex: smoke, OR logic smoke|regression, AND logic smoke.regression, etc.)'
  type: string
  default: 'none'

- name: browser
  displayName: 'Browser Project'
  type: string
  default: 'chromium'
  values:
    - 'chromium'
    - 'firefox'

- name: agentPool
  displayName: 'Agent Pool'
  type: string
  default: 'Automation-Playwright-Pool'
  values:
    - 'Automation-Playwright-Pool'

- name: agentLabel
  displayName: 'Agent Label (agents with this capability will be used)'
  type: string
  default: 'none'
  values:
    - 'none'
    - 'regression'
    - 'smoke_stg'
    - 'smoke_live'

- name: parallelExecution
  displayName: 'Parallel Execution Strategy'
  type: string
  default: 'all-agents'
  values:
    - 'single'
    - 'all-agents'

- name: slackChannel
  displayName: 'Slack Channel for Reports (Optional)'
  type: string
  default: 'none'

variables:
  # Build configuration
  buildConfiguration: 'Release'
  
  # Test configuration
  ENVIRONMENT: ${{ parameters.environment }}
  PLAN_ID: ${{ parameters.planid }}
  CI: true

  # Paths
  buildOutputPath: '$(System.DefaultWorkingDirectory)/dist'
  allureResultsPath: '$(System.DefaultWorkingDirectory)/allure-results'
  allureReportPath: '$(System.DefaultWorkingDirectory)/allure-report'
  screenshotsPath: '$(System.DefaultWorkingDirectory)/test-results'

stages:
- stage: BuildAndTest
  displayName: 'Build and Test Application'
  jobs:
  - job: BuildAndTestJob
    displayName: 'Build and Test Playwright'
    ${{ if eq(parameters.parallelExecution, 'all-agents') }}:
      strategy:
        maxParallel: 3
        matrix:
          Shard1:
            SHARD_INDEX: 1
          Shard2:
            SHARD_INDEX: 2
          Shard3:
            SHARD_INDEX: 3
    pool:
      name: ${{ parameters.agentPool }}
      ${{ if ne(parameters.agentLabel, 'none') }}:
        demands:
        - ${{ parameters.agentLabel }}
    timeoutInMinutes: 180  # Per job timeout (all parallel jobs run within this time)
    
    steps:
    - checkout: self
      clean: true
      fetchDepth: 0
      lfs: true
    
    - task: NodeTool@0
      displayName: 'Setup Node.js'
      inputs:
        versionSpec: '20.x'
        checkLatest: true

    - task: Cache@2
      displayName: 'Cache Node Modules'
      inputs:
        key: 'npm | "$(Agent.OS)" | package-lock.json'
        restoreKeys: |
          npm | "$(Agent.OS)"
        path: '$(System.DefaultWorkingDirectory)/node_modules'

    - script: |
        echo "Fetching from Azure DevOps Repository..."
        echo "Repository: $(Build.Repository.Name)"
        echo "Branch: ${{ parameters.branch }}"
        echo "Commit: $(Build.SourceVersion)"
        git log --oneline -5
      displayName: 'Display Repository Info'

    - script: |
        echo "Installing dependencies..."
        npm ci --production=false
        echo "Dependencies installed successfully"
      displayName: 'Clean Install Dependencies'

    - script: |
        echo "Installing Playwright browsers..."
        npx playwright install --with-deps chromium firefox webkit
        echo "Browsers installed successfully"
      displayName: 'Install Playwright Browsers'

    - task: PowerShell@2
      displayName: 'Validate Build Output'
      name: ValidateBuild
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "Running build validation..."
          # Validate test files can be loaded
          npx playwright test --list > test-list.txt
          $testCount = (Get-Content test-list.txt | Measure-Object -Line).Lines
          Write-Host "Found $testCount test files"
          
          if ($testCount -eq 0) {
            Write-Host "##vso[task.logissue type=warning]No tests found during build validation"
            exit 1
          } else {
            Write-Host "Build validation successful: $testCount tests discovered"
          }

    - script: |
        echo "Pipeline Parameters:"
        echo "Environment: ${{ parameters.environment }}"
        echo "Plan ID: ${{ parameters.planid }}"
        echo "Branch: ${{ parameters.branch }}"
        echo "Tag Filter: ${{ parameters.specificTag }}"
        echo "Browser: ${{ parameters.browser }}"
        echo "Slack Channel: ${{ parameters.slackChannel }}"
        echo "Agent Pool: ${{ parameters.agentPool }}"
        echo "Agent Label: ${{ parameters.agentLabel }}"
        echo "Repository: $(Build.Repository.Name)"
        echo "Build Number: $(Build.BuildNumber)"
        echo "Source Version: $(Build.SourceVersion)"
      displayName: 'Display Parameters'

    - task: PowerShell@2
      displayName: 'Run Playwright Tests'
      continueOnError: true
      env:
        ENVIRONMENT: ${{ parameters.environment }}
        PLAN_ID: ${{ parameters.planid }}
        CI: true
      inputs:
        targetType: 'inline'
        script: |
          $env:ENVIRONMENT = "${{ parameters.environment }}"
          $env:PLAN_ID = "${{ parameters.planid }}"
          $env:CI = "true"
          
          # Use npm run scripts based on environment and browser
          $npmScript = "test:${{ parameters.environment }}"
          
          # Add sharding for parallel execution
          $shardArgs = ""
          if ("$(SHARD_INDEX)" -ne "") {
            $parallelExecution = "${{ parameters.parallelExecution }}"
            
            if ($parallelExecution -eq "all-agents") {
              $detectedAgentCount = 3  # Fixed agent count
              $currentShard = [int]"$(SHARD_INDEX)"
              $shardArgs = "--shard=$currentShard/$detectedAgentCount"
              Write-Host "Running shard $currentShard of $detectedAgentCount agents"
              
              # Add staggered delay to prevent login conflicts
              switch ($currentShard) {
                1 { 
                  Write-Host "Agent 1: Starting immediately"
                  $delaySeconds = 0 
                }
                2 { 
                  Write-Host "Agent 2: Waiting 1 minutes before starting..."
                  $delaySeconds = 60 
                }
                3 { 
                  Write-Host "Agent 3: Waiting 2 minutes before starting..."
                  $delaySeconds = 120 
                }
                default {
                  $delaySeconds = 0
                }
              }
              
              if ($delaySeconds -gt 0) {
                Write-Host "Waiting $delaySeconds seconds to stagger login attempts..."
                Start-Sleep -Seconds $delaySeconds
              }
            } else {
              $detectedAgentCount = 1
              $currentShard = [int]"$(SHARD_INDEX)"
              $shardArgs = "--shard=$currentShard/$detectedAgentCount"
              Write-Host "Running shard $currentShard of $detectedAgentCount agent"
            }
          }
          
          # Add tag filter if specified
          if ("${{ parameters.specificTag }}" -ne "" -and "${{ parameters.specificTag }}" -ne "none") {
            $grepPattern = "${{ parameters.specificTag }}"
            
            # Handle multiple tags: convert smoke.regression to @smoke.*@regression
            if ($grepPattern.Contains(".") -and -not $grepPattern.StartsWith("@")) {
              $grepPattern = $grepPattern -replace '\.', '.*@'
              $grepPattern = "@" + $grepPattern
            }
            # Handle OR tags: convert smoke|regression to @smoke|@regression
            elseif ($grepPattern.Contains("|") -and -not $grepPattern.StartsWith("@")) {
              $grepPattern = $grepPattern -replace '\|', '|@'
              $grepPattern = "@" + $grepPattern
            }
            # Single tag: add @ prefix if not present
            elseif (-not $grepPattern.StartsWith("@")) {
              $grepPattern = "@" + $grepPattern
            }
            
            $fullCommand = "npm run $npmScript -- $shardArgs --grep=`"$grepPattern`""
            Write-Host "Executing: $fullCommand"
            Invoke-Expression $fullCommand
          } else {
            $fullCommand = "npm run $npmScript -- $shardArgs"
            Write-Host "Executing: $fullCommand"
            Invoke-Expression $fullCommand
          }

    # Generate Allure Report
    - task: PowerShell@2
      displayName: 'Install and Generate Allure Report'
      condition: always()
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "Installing Allure CLI..."
          npm install -g allure-commandline --force
          
          # Always create the report directory first
          $reportPath = "$(allureReportPath)"
          Write-Host "Creating report directory: $reportPath"
          New-Item -ItemType Directory -Force -Path "$reportPath" | Out-Null
          
          $resultsPath = "$(allureResultsPath)"
          Write-Host "Looking for results in: $resultsPath"
          
          if (Test-Path "$resultsPath") {
            $resultFiles = Get-ChildItem -Path "$resultsPath" -Filter "*.json" -ErrorAction SilentlyContinue
            Write-Host "Found $($resultFiles.Count) result files"
            
            if ($resultFiles.Count -gt 0) {
              Write-Host "Generating Allure report..."
              Write-Host "Results path: $resultsPath"
              Write-Host "Report path: $reportPath"
              
              try {
                allure generate "$resultsPath" --clean -o "$reportPath"
                Write-Host "Allure generate command executed"
                
                if (Test-Path "$reportPath\index.html") {
                  Write-Host "Allure report generated successfully"
                } else {
                  Write-Host "##vso[task.logissue type=warning]Allure report index.html not found after generation"
                  Write-Output "Allure generation completed but no index.html found" | Out-File "$reportPath\generation-log.txt"
                }
              } catch {
                Write-Host "##vso[task.logissue type=warning]Allure generation failed: $($_.Exception.Message)"
                Write-Output "Allure generation failed: $($_.Exception.Message)" | Out-File "$reportPath\error-log.txt"
              }
            } else {
              Write-Host "No JSON result files found"
              Write-Output "No test result files were found" | Out-File "$reportPath\no-results.txt"
            }
          } else {
            Write-Host "No allure results directory found at: $resultsPath"
            Write-Output "No test results directory found" | Out-File "$reportPath\no-results-directory.txt"
          }

    # Set dynamic artifact name
    - task: PowerShell@2
      displayName: 'Set Artifact Name'
      condition: always()
      inputs:
        targetType: 'inline'
        script: |
          $artifactName = "AllureReport-${{ parameters.environment }}-${{ parameters.browser }}"
          $parallelExecution = "${{ parameters.parallelExecution }}"
          $shardIndex = "$(SHARD_INDEX)"

          if ($parallelExecution -eq "all-agents") {
            $detectedAgentCount = 3  # Fixed agent count
            if ($shardIndex -ne "") {
              $artifactName += "-Shard$shardIndex" + "of$detectedAgentCount"
            }
          }

          $timestamp = Get-Date -Format "yyyyMMdd-HHmm"
          $artifactName += "-$timestamp"

          Write-Host "Setting artifact name: $artifactName"
          Write-Host "##vso[task.setvariable variable=DYNAMIC_ARTIFACT_NAME]$artifactName"

          # Set shard suffix used to name the raw results artifact for later merging
          if ($parallelExecution -eq "all-agents" -and $shardIndex -ne "") {
            $shardSuffix = "-Shard$shardIndex"
          } else {
            $shardSuffix = "-Single"
          }
          Write-Host "##vso[task.setvariable variable=SHARD_SUFFIX]$shardSuffix"

    # Publish Allure Report as Build Artifact
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Allure Report'
      condition: always()
      continueOnError: true
      inputs:
        pathToPublish: '$(allureReportPath)'
        artifactName: '$(DYNAMIC_ARTIFACT_NAME)'
        publishLocation: 'Container'

    # Publish raw Allure results (JSON) so the MergeAndReport stage can combine them
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Allure Results (Raw)'
      condition: always()
      continueOnError: true
      inputs:
        pathToPublish: '$(allureResultsPath)'
        artifactName: 'AllureResults-${{ parameters.environment }}-${{ parameters.browser }}$(SHARD_SUFFIX)'
        publishLocation: 'Container'

    # Parse test results for Slack notification
    - task: PowerShell@2
      displayName: 'Parse Test Results'
      condition: always()
      inputs:
        targetType: 'inline'
        script: |
          # Parse Allure results for summary
          $resultsPath = "$(allureResultsPath)"
          $totalTests = 0
          $passedTests = 0
          $failedTests = 0
          $skippedTests = 0
          
          Write-Host "Looking for results in: $resultsPath"
          
          if (Test-Path $resultsPath) {
            $resultFiles = Get-ChildItem -Path $resultsPath -Filter "*-result.json" -ErrorAction SilentlyContinue
            Write-Host "Found $($resultFiles.Count) result files"
            
            foreach ($file in $resultFiles) {
              try {
                $result = Get-Content $file.FullName | ConvertFrom-Json
                $totalTests++
                
                switch ($result.status) {
                  "passed" { $passedTests++ }
                  "failed" { $failedTests++ }
                  "broken" { $failedTests++ }
                  "skipped" { $skippedTests++ }
                  default { $skippedTests++ }
                }
              } catch {
                Write-Host "Warning: Could not parse result file: $($file.Name)"
              }
            }
          } else {
            Write-Host "No results directory found"
          }
          
          # Set pipeline variables for Slack notification
          Write-Host "##vso[task.setvariable variable=TotalTests]$totalTests"
          Write-Host "##vso[task.setvariable variable=PassedTests]$passedTests"
          Write-Host "##vso[task.setvariable variable=FailedTests]$failedTests"
          Write-Host "##vso[task.setvariable variable=SkippedTests]$skippedTests"
          
          # Calculate success rate
          if ($totalTests -gt 0) {
            $successRate = [math]::Round(($passedTests / $totalTests) * 100, 2)
            Write-Host "##vso[task.setvariable variable=SuccessRate]$successRate"
          } else {
            Write-Host "##vso[task.setvariable variable=SuccessRate]0"
          }
          
          # Determine overall status
          $overallStatus = if ($failedTests -eq 0) { "SUCCESS" } else { "FAILURE" }
          Write-Host "##vso[task.setvariable variable=OverallStatus]$overallStatus"
          
          Write-Host "Test Summary:"
          Write-Host "Total: $totalTests, Passed: $passedTests, Failed: $failedTests, Skipped: $skippedTests"
          Write-Host "Success Rate: $successRate%, Overall Status: $overallStatus"

- stage: MergeAndReport
  displayName: 'Merge Allure Reports into Combined Report'
  dependsOn: BuildAndTest
  condition: and(always(), eq('${{ parameters.parallelExecution }}', 'all-agents'))
  jobs:
  - job: MergeAllureReports
    displayName: 'Merge Shard Reports and Publish'
    pool:
      name: ${{ parameters.agentPool }}
      ${{ if ne(parameters.agentLabel, 'none') }}:
        demands:
        - ${{ parameters.agentLabel }}
    timeoutInMinutes: 30
    steps:
    - checkout: none

    - task: NodeTool@0
      displayName: 'Setup Node.js'
      inputs:
        versionSpec: '20.x'
        checkLatest: true

    - task: DownloadPipelineArtifact@2
      displayName: 'Download Shard 1 Results'
      continueOnError: true
      inputs:
        buildType: 'current'
        artifactName: 'AllureResults-${{ parameters.environment }}-${{ parameters.browser }}-Shard1'
        targetPath: '$(Pipeline.Workspace)/shard1'

    - task: DownloadPipelineArtifact@2
      displayName: 'Download Shard 2 Results'
      continueOnError: true
      inputs:
        buildType: 'current'
        artifactName: 'AllureResults-${{ parameters.environment }}-${{ parameters.browser }}-Shard2'
        targetPath: '$(Pipeline.Workspace)/shard2'

    - task: DownloadPipelineArtifact@2
      displayName: 'Download Shard 3 Results'
      continueOnError: true
      inputs:
        buildType: 'current'
        artifactName: 'AllureResults-${{ parameters.environment }}-${{ parameters.browser }}-Shard3'
        targetPath: '$(Pipeline.Workspace)/shard3'

    - task: PowerShell@2
      displayName: 'Merge Allure Results and Generate Combined Report'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "Installing Allure CLI..."
          npm install -g allure-commandline --force

          $mergedResultsPath = "$(System.DefaultWorkingDirectory)/merged-allure-results"
          $mergedReportPath  = "$(System.DefaultWorkingDirectory)/merged-allure-report"

          New-Item -ItemType Directory -Force -Path $mergedResultsPath | Out-Null
          New-Item -ItemType Directory -Force -Path $mergedReportPath  | Out-Null

          # Copy every file from each downloaded shard directory into the merged folder
          $shardDirs = Get-ChildItem -Path "$(Pipeline.Workspace)" -Directory -Filter "shard*"
          Write-Host "Found $($shardDirs.Count) shard directories"
          $totalFiles = 0

          foreach ($shardDir in $shardDirs) {
            Write-Host "Processing $($shardDir.Name)..."
            $files = Get-ChildItem -Path $shardDir.FullName -File -ErrorAction SilentlyContinue
            Write-Host "  $($files.Count) files"

            foreach ($file in $files) {
              $dest = Join-Path $mergedResultsPath $file.Name
              if (Test-Path $dest) {
                # Allure uses UUIDs so collisions are rare; prefix with shard name as fallback
                $dest = Join-Path $mergedResultsPath "$($shardDir.Name)_$($file.Name)"
              }
              Copy-Item $file.FullName -Destination $dest
              $totalFiles++
            }
          }

          Write-Host "Total files merged: $totalFiles"

          if ($totalFiles -eq 0) {
            Write-Host "##vso[task.logissue type=warning]No result files found to merge — skipping report generation"
            exit 0
          }

          Write-Host "Generating combined Allure report..."
          allure generate "$mergedResultsPath" --clean -o "$mergedReportPath"

          if (Test-Path "$mergedReportPath/index.html") {
            Write-Host "Combined Allure report generated successfully"
          } else {
            Write-Host "##vso[task.logissue type=warning]index.html not found after allure generate"
          }

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Combined Allure Report'
      condition: always()
      continueOnError: true
      inputs:
        pathToPublish: '$(System.DefaultWorkingDirectory)/merged-allure-report'
        artifactName: 'AllureReport-Combined-${{ parameters.environment }}-${{ parameters.browser }}'
        publishLocation: 'Container'